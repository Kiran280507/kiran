name: Kiran Portfolio Deployment

on:
  push:
    branches: [ main ] # Triggered when Kiran pushes to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Portfolio Integrity Check
        run: |
          echo "Validating Kiran's Analytics Suite..."
          # This ensures the index file exists before deploying
          test -f index.html || exit 1 

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages # Deploys to the live hosting branch
